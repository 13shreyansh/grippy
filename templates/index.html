<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grippy — Just Grip It</title>
  <meta name="description" content="AI-powered consumer complaint filing. Describe your problem. We handle the rest." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero {
      text-align: center;
      padding: 48px 24px;
      max-width: 560px;
    }
    .logo {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #111827;
      line-height: 1;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 22px;
      color: #6b7280;
      font-weight: 400;
      margin-bottom: 48px;
      letter-spacing: 0.5px;
    }
    .cta-btn {
      display: inline-block;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: 600;
      padding: 18px 40px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
      border: none;
    }
    .cta-btn:hover { background: #15803d; transform: translateY(-1px); }
    .sub {
      margin-top: 20px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">Grippy</div>
    <div class="tagline">Just grip it.</div>
    <a href="/chat" class="cta-btn">Got a complaint? Let's grip it.</a>
    <p class="sub">Describe your problem. We file the complaint. You sit back.</p>
  </div>
</body>
</html>
